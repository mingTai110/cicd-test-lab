name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
      draft:
        description: 'Create as draft release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact-name }}
      language: ${{ steps.meta.outputs.language }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve build metadata
        id: meta
        run: |
          name="${{ github.event.repository.name }}-${{ inputs.tag }}"
          echo "artifact-name=$name" >> "$GITHUB_OUTPUT"

          if [ -f "package.json" ]; then
            echo "language=node" >> "$GITHUB_OUTPUT"
          elif [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            echo "language=python" >> "$GITHUB_OUTPUT"
          else
            echo "language=generic" >> "$GITHUB_OUTPUT"
          fi

          echo "## Build: $name" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** \`${{ inputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pre-release:** ${{ inputs.prerelease }}" >> "$GITHUB_STEP_SUMMARY"

      # ---------- Node.js ----------
      - name: Setup Node.js
        if: steps.meta.outputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Build Node.js
        if: steps.meta.outputs.language == 'node'
        run: |
          npm ci
          npm run build --if-present

      # ---------- Python ----------
      - name: Setup Python
        if: steps.meta.outputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python package
        if: steps.meta.outputs.language == 'python'
        run: |
          pip install build
          python -m build

      # ---------- Package ----------
      - name: Package artifact
        run: |
          artifact="${{ steps.meta.outputs.artifact-name }}"
          if [ -d "dist" ]; then
            zip -r "${artifact}.zip" dist/
          elif [ -d "build" ]; then
            zip -r "${artifact}.zip" build/
          else
            git archive --format=zip HEAD > "${artifact}.zip"
          fi
          echo "- **Artifact:** \`${artifact}.zip\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact-name }}
          path: ${{ steps.meta.outputs.artifact-name }}.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: '*.zip'
          generate_release_notes: true

      - name: Report summary
        run: |
          echo "### Release created" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag \`${{ inputs.tag }}\` published to GitHub Releases." >> "$GITHUB_STEP_SUMMARY"
