name: Dependency Audit

on:
  workflow_dispatch:
    inputs:
      fail-on-severity:
        description: 'Minimum severity level to fail (low|moderate|high|critical)'
        required: false
        default: 'high'
        type: choice
        options: [low, moderate, high, critical]
  pull_request:
    paths:
      - '**/package*.json'
      - '**/requirements*.txt'
      - '**/pyproject.toml'
      - '**/Pipfile*'
  schedule:
    - cron: '0 8 * * 1'  # Weekly — Monday 08:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for npm project
        id: check
        run: |
          if [ -f "package-lock.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package-lock.json found — skipping npm audit" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: Run npm audit (JSON)
        if: steps.check.outputs.exists == 'true'
        run: npm audit --json > npm-audit-report.json || true

      - name: Fail on severity threshold
        if: steps.check.outputs.exists == 'true'
        run: npm audit --audit-level=${{ inputs.fail-on-severity || 'high' }}

      - name: Summarise findings
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "### npm audit" >> "$GITHUB_STEP_SUMMARY"
          if [ -f npm-audit-report.json ]; then
            total=$(jq '.metadata.vulnerabilities | .total' npm-audit-report.json 2>/dev/null || echo "N/A")
            high=$(jq '.metadata.vulnerabilities.high' npm-audit-report.json 2>/dev/null || echo "N/A")
            critical=$(jq '.metadata.vulnerabilities.critical' npm-audit-report.json 2>/dev/null || echo "N/A")
            echo "| Total | High | Critical |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-------|------|----------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| $total | $high | $critical |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload npm audit report
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Python project
        id: check
        run: |
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No requirements.txt or pyproject.toml found — skipping pip-audit" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.exists == 'true'
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-audit
        if: steps.check.outputs.exists == 'true'
        run: pip install pip-audit

      - name: Run pip-audit
        if: steps.check.outputs.exists == 'true'
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --output json -o pip-audit-report.json || true
            pip-audit -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip-audit --output json -o pip-audit-report.json || true
            pip-audit
          fi

      - name: Summarise findings
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "### pip-audit" >> "$GITHUB_STEP_SUMMARY"
          if [ -f pip-audit-report.json ]; then
            count=$(jq '[.[] | .vulns[]] | length' pip-audit-report.json 2>/dev/null || echo "N/A")
            echo "Vulnerabilities found: **$count**" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload pip-audit report
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: ${{ inputs.fail-on-severity || 'high' }}
