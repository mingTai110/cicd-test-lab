name: Lint and Test

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language (auto|node|python)'
        required: false
        default: 'auto'
        type: choice
        options: [auto, node, python]
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      language: ${{ steps.detect.outputs.language }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect language
        id: detect
        run: |
          lang="${{ inputs.language || 'auto' }}"
          if [ "$lang" = "auto" ]; then
            if [ -f "package.json" ]; then
              lang="node"
            elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
              lang="python"
            else
              lang="unknown"
            fi
          fi
          echo "language=$lang" >> "$GITHUB_OUTPUT"
          echo "### Language detected: \`$lang\`" >> "$GITHUB_STEP_SUMMARY"

  node:
    needs: detect
    if: needs.detect.outputs.language == 'node'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.x', '20.x', '22.x']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Report summary
        if: always()
        run: |
          echo "| Node ${{ matrix.node-version }} | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  python:
    needs: detect
    if: needs.detect.outputs.language == 'python'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true

      - name: Lint with flake8
        run: |
          # Fail on syntax errors and undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (exit 0)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: pytest --cov --cov-report=xml --cov-report=term-missing || true

      - name: Report summary
        if: always()
        run: |
          echo "| Python ${{ matrix.python-version }} | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 7
